name=MQTTOTAv5
version=1.0.0
author=Jorge Gaspar Beltre Rivera
maintainer=Jorge Gaspar Beltre Rivera
sentence=Secure OTA firmware updates for ESP32 over MQTT v5.0 with SHA-256, HMAC, and chunked transfer.
paragraph=MQTTOTAv5 is a production-ready OTA library that uses ESP32_MQTTv5 as its transport layer. Features: MQTT 5.0 User Properties for metadata, SHA-256 firmware verification (mbedtls — no extra deps), HMAC-SHA256 signature (obligatory in production), incremental hash per chunk, Message Expiry Interval, Correlation Data, Response Topic, Subscription Identifier, Enhanced AUTH flow, Will Message with delay, non-blocking restart timer, and automatic rollback protection via ESP-IDF.
category=Communication
